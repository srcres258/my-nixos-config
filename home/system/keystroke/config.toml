# 显示模式： "keystroke"（经典） 或 "bubble"（气泡极简模式）
mode = "keystroke"

# 位置相关设置（Layer Shell 常用参数）
# anchor / gravity / position 示例（具体键名请查看你的项目源代码或生成的 config.toml）
anchor = "bottom-right"     # 或 "south-east"
gravity = "south-east"
position = "bottom-right"
x_offset = 20               # 右下角微调，单位像素
y_offset = 20

# 其他常见选项
# size = { width = 300, height = 100 }
# timeout = 2000              # 键击显示持续时间 ms
# opacity = 0.9
